<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>

<title>Permainan Anak Dunia — Zaman Milenial</title>

<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #EEF2F8;
  --bg-deep:   #E4EAF3;
  --ink:       #17273F;
  --ink-soft:  #4B5C74;
  --muted:     #8496AF;
  --card:      #FFFFFF;
  --card-border: #E5EAF2;
  --line:      #E9EDF4;
  --accent:    #2E7BD6;
  --accent-deep: #1B5FB0;
  --amber:     #F4A02A;
  --amber-deep:#E0850F;
  --shadow:    0 2px 10px rgba(23,39,63,0.06);
  --shadow-lg: 0 10px 30px rgba(23,39,63,0.10);
  --radius:    16px;
  --font-head: 'Exo 2', sans-serif;
  --font-body: 'Nunito', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 45% at 15% 0%, rgba(46,123,214,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 55% 40% at 90% 15%, rgba(244,160,42,0.07) 0%, transparent 55%);
  pointer-events:none;z-index:0;
}

.page { position:relative;z-index:1;max-width:760px;margin:0 auto;padding:1.75rem 1.1rem 4rem; }

.header {
  text-align:center;
  padding: 1.25rem 0 1.75rem;
}
.header h1 {
  font-family: var(--font-head);
  font-size: clamp(1.5rem, 5vw, 2.4rem);
  font-weight: 900;
  letter-spacing: -0.02em;
  color: var(--ink);
  line-height: 1.15;
}
.header p {
  color: var(--muted);
  font-size: .88rem;
  margin-top: .45rem;
  letter-spacing: .02em;
}

.controls {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 22px;
  padding: 1.1rem 1.1rem 1.25rem;
  box-shadow: var(--shadow);
  margin-bottom: 1.5rem;
}

.search-wrap { position: relative; margin-bottom: .7rem; }
.search-wrap svg {
  position:absolute;left:18px;top:50%;transform:translateY(-50%);
  width:18px;height:18px;color:var(--muted);
  pointer-events:none;
}
#searchInput {
  width:100%;
  background: var(--bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: .8rem 1rem .8rem 3rem;
  color: var(--ink);
  font-family: var(--font-body);
  font-size: .95rem;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
#searchInput::placeholder { color: var(--muted); }
#searchInput:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(46,123,214,0.12);
}

.dropdown { position: relative; margin-bottom: .9rem; }
.dropdown-btn {
  width:100%;
  display:flex; align-items:center; gap:.6rem;
  background: var(--bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: .8rem 1rem;
  color: var(--ink);
  font-family: var(--font-body);
  font-weight: 700;
  font-size: .95rem;
  cursor: pointer;
  transition: border-color .2s;
}
.dropdown-btn:hover { border-color: var(--accent); }
.dropdown-btn .dd-icon { font-size: 1.05rem; }
.dropdown-btn .dd-label { flex:1; text-align:left; }
.dropdown-btn .dd-chevron { width:16px;height:16px;color:var(--muted); transition: transform .2s; }
.dropdown.open .dd-chevron { transform: rotate(180deg); }

.dropdown-list {
  position:absolute; left:0; right:0; top:calc(100% + 6px);
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  box-shadow: var(--shadow-lg);
  max-height: 300px;
  overflow-y: auto;
  z-index: 40;
  display: none;
  padding: 6px;
}
.dropdown.open .dropdown-list { display:block; }
.dropdown-item {
  display:flex; align-items:center; gap:.55rem;
  padding: .6rem .75rem;
  border-radius: 10px;
  font-size: .88rem;
  font-weight: 600;
  color: var(--ink-soft);
  cursor: pointer;
  transition: background .15s, color .15s;
}
.dropdown-item:hover { background: var(--bg); }
.dropdown-item.active { background: rgba(46,123,214,0.1); color: var(--accent-deep); }
.dropdown-item .swatch { width:8px;height:8px;border-radius:50%; flex-shrink:0; }

.random-btn {
  width:100%;
  background: linear-gradient(135deg, #FBB13C, var(--amber-deep));
  border: none;
  padding: 14px 20px;
  border-radius: 14px;
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 1rem;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(224,133,15,0.35);
  transition: transform .15s, box-shadow .15s;
  letter-spacing: .02em;
}
.random-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(224,133,15,0.45); }
.random-btn:active { transform: scale(0.98); }
.random-btn .dice { margin-right: 6px; }

.result-count {
  text-align:center;
  color: var(--ink-soft);
  font-size: .92rem;
  margin: .3rem 0 1.25rem;
}
.result-count b { color: var(--accent); font-family: var(--font-head); }

.cards { display: flex; flex-direction: column; gap: .85rem; }

.card {
  position: relative;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-left: 5px solid var(--cat-color, var(--accent));
  border-radius: var(--radius);
  padding: 1rem 1.15rem;
  box-shadow: var(--shadow);
  transition: box-shadow .2s, transform .2s;
}
.card:hover { box-shadow: var(--shadow-lg); }

.card.highlight {
  background: linear-gradient(135deg, rgba(244,160,42,0.10), rgba(244,160,42,0.04));
  border-color: var(--amber);
  border-left-color: var(--amber-deep);
}

.card-top {
  display:flex; align-items:flex-start; gap:.6rem;
  margin-bottom: .35rem;
}
.card-num {
  font-family: var(--font-head);
  font-weight: 600;
  color: var(--muted);
  font-size: .85rem;
  padding-top: .2rem;
  flex-shrink:0;
  min-width: 1.6em;
}
.card-name {
  font-family: var(--font-head);
  font-weight: 800;
  font-size: 1.12rem;
  color: var(--accent-deep);
  flex: 1;
  line-height:1.3;
}
.card.highlight .card-name { color: var(--amber-deep); }

.card-badge {
  flex-shrink:0;
  font-size: .68rem;
  font-family: var(--font-head);
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 50px;
  background: var(--badge-bg, rgba(46,123,214,0.1));
  color: var(--badge-color, var(--accent-deep));
  white-space: nowrap;
}
.card.highlight .card-badge {
  background: var(--amber-deep) !important;
  color: #fff !important;
}

.card-desc {
  color: var(--ink-soft);
  font-size: .92rem;
  line-height: 1.5;
  padding-left: calc(1.6em + .6rem);
}

.empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--muted);
  font-size: .95rem;
}
.empty span { font-size: 2rem; display: block; margin-bottom: .5rem; }

.footer {
  text-align: center;
  margin-top: 3rem;
  color: var(--muted);
  font-size: .78rem;
  letter-spacing: .04em;
}

#scrollTopBtn {
  position: fixed;
  bottom: 26px;
  right: 22px;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: 1px solid var(--card-border);
  background: var(--card);
  color: var(--accent-deep);
  font-size: 1.3rem;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.2s ease, box-shadow .2s;
  box-shadow: var(--shadow-lg);
  z-index: 999;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
#scrollTopBtn.visible { opacity: 0; pointer-events: auto; }
#scrollTopBtn.visible:hover { transform: scale(1.08); }
#scrollTopBtn:active { transform: scale(0.92); }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(46,123,214,0.3); border-radius: 3px; }

@media(max-width:600px){
  .header h1 { font-size: 1.4rem; }
  .card-name { font-size: 1.02rem; }
  #scrollTopBtn { bottom: 18px; right: 16px; width: 40px; height: 40px; font-size: 1.1rem; }
}
</style>
</head>

// ============================================================
function mergeItems(cat, sub, newItems) {
  const existing = DATA.find(d => d.cat === cat && d.sub === sub);
  if (existing) {
    const combined = [...existing.items, ...newItems];
    const seen = new Set();
    existing.items = combined.filter(item => {
      const key = item.name;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  } else {
    DATA.push({ cat, sub, items: [...newItems] });
  }
}

// ============================================================
//  FUNGSI UTAMA — TAMPILAN KARTU DATAR (FLAT LIST)
// ============================================================
let activeFilter = 'all';
let searchQuery  = '';

function catInfo(id){
  return CATEGORIES.find(c => c.id === id) || { icon:'🎮', label:id, color:'#2E7BD6' };
}

function buildDropdown(){
  const list = document.getElementById('dropdownList');
  list.innerHTML = '';

  const allRow = document.createElement('div');
  allRow.className = 'dropdown-item active';
  allRow.dataset.id = 'all';
  allRow.innerHTML = `<span class="dd-icon">📋</span><span>Semua Kategori</span>`;
  allRow.onclick = () => selectCategory('all');
  list.appendChild(allRow);

  CATEGORIES.forEach(cat => {
    const row = document.createElement('div');
    row.className = 'dropdown-item';
    row.dataset.id = cat.id;
    row.innerHTML = `<span class="swatch" style="background:${cat.color}"></span><span>${cat.icon} ${cat.label}</span>`;
    row.onclick = () => selectCategory(cat.id);
    list.appendChild(row);
  });
}

function selectCategory(id){
  activeFilter = id;
  const ddIcon = document.getElementById('ddIcon');
  const ddLabel = document.getElementById('ddLabel');
  if(id === 'all'){
    ddIcon.textContent = '📋';
    ddLabel.textContent = 'Semua Kategori';
  } else {
    const cat = catInfo(id);
    ddIcon.textContent = cat.icon;
    ddLabel.textContent = cat.label;
  }
  document.querySelectorAll('.dropdown-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  document.getElementById('catDropdown').classList.remove('open');
  refreshCards();
}

document.getElementById('dropdownBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('catDropdown').classList.toggle('open');
});
document.addEventListener('click', (e) => {
  const dd = document.getElementById('catDropdown');
  if (!e.target.closest('#catDropdown')) dd.classList.remove('open');
});

let searchDebounce = null;
function applyFilters(){
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
    refreshCards();
  }, 150);
}

function flattenGames(){
  const flat = [];
  let uid = 0;
  DATA.forEach(d => {
    const cat = catInfo(d.cat);
    d.items.forEach(item => {
      flat.push({ id: 'g' + (uid++), name:item.name, desc:item.desc, cat:d.cat, sub:d.sub, catLabel:cat.label, icon:cat.icon, color:cat.color });
    });
  });
  return flat;
}

const ALL_GAMES = flattenGames();

let isAnimating = false;

function buildCardEl(g, i){
  const card = document.createElement('div');
  card.className = 'card';
  card.id = g.id;
  card.dataset.name = g.name;
  card.style.setProperty('--cat-color', g.color);
  card.style.setProperty('--badge-bg', hexToRgba(g.color, 0.12));
  card.style.setProperty('--badge-color', g.color);
  card.innerHTML = `
    <div class="card-top">
      <span class="card-num">${i + 1}.</span>
      <span class="card-name">${g.name}</span>
      <span class="card-badge">${g.catLabel}</span>
    </div>
    <div class="card-desc">${g.desc}</div>`;
  return card;
}

function getFiltered(){
  return ALL_GAMES.filter(g => {
    if (activeFilter !== 'all' && g.cat !== activeFilter) return false;
    if (searchQuery && !g.name.toLowerCase().includes(searchQuery)) return false;
    return true;
  });
}

function renderCards(animateIn = true, onComplete = null){
  const wrap = document.getElementById('cardsWrap');
  const empty = document.getElementById('emptyState');
  const countEl = document.getElementById('resultCount');

  const filtered = getFiltered();
  wrap.innerHTML = '';

  countEl.innerHTML = `Menampilkan <b>${filtered.length}</b> permainan`;
  empty.style.display = filtered.length === 0 ? 'block' : 'none';

  const fragment = document.createDocumentFragment();
  filtered.forEach((g, i) => fragment.appendChild(buildCardEl(g, i)));
  wrap.appendChild(fragment);

  if (animateIn && window.gsap) {
    const cards = wrap.querySelectorAll('.card');
    gsap.set(cards, { opacity: 0, y: 24, scale: 0.96 });
    gsap.to(cards, {
      opacity: 1, y: 0, scale: 1,
      duration: 0.45, stagger: { each: 0.02, amount: 0.4, from: 'start' }, ease: 'power2.out',
      clearProps: 'transform',
      onComplete: () => { if (onComplete) onComplete(); }
    });
  } else {
    if (onComplete) onComplete();
  }
}

function refreshCards(callback){
  if (isAnimating) return;
  isAnimating = true;

  const wrap = document.getElementById('cardsWrap');
  const existing = wrap.querySelectorAll('.card');

  const finish = () => {
    renderCards(true, () => {
      isAnimating = false;
      if (callback) callback();
    });
  };

  if (!window.gsap || existing.length === 0) {
    finish();
    return;
  }

  gsap.to(existing, {
    opacity: 0, y: -16, scale: 0.94,
    duration: 0.2, stagger: { each: 0.012, amount: 0.25, from: 'start' }, ease: 'power2.in',
    onComplete: finish
  });
}

function hexToRgba(hex, alpha){
  const h = hex.replace('#','');
  const bigint = parseInt(h.length === 3 ? h.split('').map(c=>c+c).join('') : h, 16);
  const r = (bigint >> 16) & 255, g = (bigint >> 8) & 255, b = bigint & 255;
  return `rgba(${r},${g},${b},${alpha})`;
}

// ============================================================
//  FUNGSI PILIH ACAK — dengan perayaan GSAP
// ============================================================
function pickRandom() {
  if (isAnimating || ALL_GAMES.length === 0) return;

  const random = ALL_GAMES[Math.floor(Math.random() * ALL_GAMES.length)];

  // Reset filter & pencarian supaya kartu terpilih pasti tampil
  activeFilter = 'all';
  document.getElementById('ddIcon').textContent = '📋';
  document.getElementById('ddLabel').textContent = 'Semua Kategori';
  document.querySelectorAll('.dropdown-item').forEach(el => el.classList.toggle('active', el.dataset.id === 'all'));
  document.getElementById('searchInput').value = '';
  searchQuery = '';

  document.querySelectorAll('.card.highlight').forEach(c => c.classList.remove('highlight'));

  refreshCards(() => {
    const card = document.getElementById(random.id);
    if (!card) return;

    card.scrollIntoView({ behavior: 'smooth', block: 'center' });

    const celebrate = () => {
      document.querySelectorAll('.card.highlight').forEach(c => c.classList.remove('highlight'));
      card.classList.add('highlight');

      if (!window.gsap) return;

      const tl = gsap.timeline();

      // Bounce in
      tl.fromTo(card, { scale: 0.85, opacity: 0.6 }, {
        scale: 1, opacity: 1, duration: 0.5, ease: 'elastic.out(1, 0.5)'
      });

      // Pulsing amber glow
      tl.to(card, {
        boxShadow: '0 0 40px rgba(244,160,42,0.45)',
        duration: 0.6, yoyo: true, repeat: 3, ease: 'sine.inOut',
        onComplete: () => {
          gsap.to(card, { boxShadow: '0 0 20px rgba(244,160,42,0.2)', duration: 0.5, ease: 'power2.out' });
        }
      }, 0);

      // Pulsing border color
      tl.to(card, {
        borderLeftColor: '#E0850F',
        duration: 0.55, yoyo: true, repeat: 3, ease: 'sine.inOut'
      }, 0);

      // Confetti-like sparks
      const emojis = ['✨', '⭐', '🎯', '🌟', '💫', '🎉'];
      for (let i = 0; i < 6; i++) {
        const spark = document.createElement('span');
        spark.textContent = emojis[i % emojis.length];
        spark.style.cssText = `
          position:absolute;
          font-size:${16 + Math.random() * 14}px;
          pointer-events:none;
          z-index:20;
          left:${15 + Math.random() * 65}%;
          top:${10 + Math.random() * 55}%;
          opacity:0;`;
        card.appendChild(spark);

        gsap.fromTo(spark, { opacity: 0, scale: 0.5, y: 0 }, {
          opacity: 1, scale: 1.2, y: -40 - Math.random() * 50,
          duration: 0.7 + Math.random() * 0.3, ease: 'power2.out',
          onComplete: () => {
            gsap.to(spark, { opacity: 0, duration: 0.3, delay: 0.2, onComplete: () => spark.remove() });
          }
        });
      }

      setTimeout(() => card.classList.remove('highlight'), 4000);
    };

    if (window.gsap) gsap.delayedCall(0.3, celebrate); else setTimeout(celebrate, 300);
  });
}
